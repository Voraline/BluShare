apply plugin: 'com.android.application'

android {
    namespace 'com.bluetoothaudio.receiver'
    compileSdk 34

    defaultConfig {
        applicationId "com.bluetoothaudio.receiver"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20 -O3 -DNDEBUG"
            }
        }
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    signingConfigs {
        release {
            if (project.hasProperty("keystorePath")) {
                storeFile file(project.property("keystorePath"))
                storePassword project.findProperty("keystorePassword") ?: "android"
                keyAlias project.findProperty("keyAlias") ?: "release"
                keyPassword project.findProperty("keyPassword") ?: "android"
            } else {
                // No real keystore provided (e.g. plain CI run) — fall back to the
                // auto-generated debug keystore so the APK is still signed and
                // installable. AGP creates ~/.android/debug.keystore automatically
                // if it doesn't already exist, so this works with zero setup.
                storeFile signingConfigs.debug.storeFile
                storePassword signingConfigs.debug.storePassword
                keyAlias signingConfigs.debug.keyAlias
                keyPassword signingConfigs.debug.keyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
